<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
      }

      .glow-btn {
        padding: 16px 40px;
        font-size: 20px;
        color: white;
        background: transparent;
        border: 2px solid #00f7ff;
        border-radius: 12px;
        cursor: pointer;
        position: relative;
        transition: 0.3s;
        letter-spacing: 1px;
      }

      .glow-btn::before {
        content: "";
        position: absolute;
        inset: -5px;
        border-radius: 12px;
        background-color: #00f7ff;
        z-index: -1;
        filter: blur(8px);
        opacity: 0;
        transition: 0.3s;
      }

      .glow-btn:hover {
        background: #00f7ff;
        color: #0f172a;
        scale: 1.2;
        box-shadow:
          0 0 10px #00f7ff,
          0 0 25px #00f7ff,
          0 0 50px #00f7ff;
      }

      .glow-btn:hover::before {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <button class="glow-btn">Klikk her</button>
  </body>
</html>
